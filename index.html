<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>rixo.lol</title>

  <!-- Favicon -->
  <link rel="icon" href="https://egz.lovable.app/favicon.ico" type="image/x-icon">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    /* Loader */
    #loader {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #111, #000);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 18px;
      letter-spacing: 1px;
      opacity: 0.8;
      animation: fadeText 1.5s ease-in-out infinite;
    }

    @keyframes fadeText {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    iframe {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    iframe.loaded {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <div class="loading-text">Launching rizo.lol...</div>
  </div>

  <iframe 
    src="https://egz.lovable.app"
    allowfullscreen
    onload="
      document.getElementById('loader').style.opacity='0';
      setTimeout(() => document.getElementById('loader').style.display='none', 400);
      this.classList.add('loaded');
    ">
  </iframe>

</body>
</html>
